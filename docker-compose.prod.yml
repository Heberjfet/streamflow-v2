version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamflow
      POSTGRES_PASSWORD: streamflow
      POSTGRES_DB: streamflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamflow -d streamflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      com.dokploy.service: postgres
      com.dokploy.type: database
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    labels:
      com.dokploy.service: redis
      com.dokploy.type: cache
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      com.dokploy.service: minio
      com.dokploy.type: storage
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: production
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://streamflow:streamflow@postgres:5432/streamflow
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: streamflow
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    labels:
      com.dokploy.service: api
      com.dokploy.type: application
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
      target: production
    environment:
      DATABASE_URL: postgresql://streamflow:streamflow@postgres:5432/streamflow
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: streamflow
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WORKER_CONCURRENCY: 2
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    labels:
      com.dokploy.service: worker
      com.dokploy.type: worker
    deploy:
      resources:
        limits:
          memory: 1024M

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/streamflow --ignore-existing;
      mc anonymous set public myminio/streamflow;
      exit 0;
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
